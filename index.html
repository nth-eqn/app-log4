<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My App Landing Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Left side -->
    <div class="left">
      <img src="icon.png" alt="App Icon" class="app-icon">
      <h1>My Awesome App</h1>
      <p class="description">Track your habits and stay productive.</p>
      <p class="sub-description">Join our early access waitlist to get notified!</p>

      <form class="waitlist-form">
        <input type="email" placeholder="Enter your email" required>
        <button type="submit">Join Waitlist</button>
      </form>

      <p class="social">
        Follow us on <a href="https://www.tiktok.com/@yourtiktok">TikTok</a>
      </p>
    </div>

    <!-- Right side -->
    <div class="right">
      <img src="simulator_screenshot.png" alt="iPhone Screenshot" class="screenshot">
    </div>
  </div>
</body>
</html>
